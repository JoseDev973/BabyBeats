<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#8B7EC8"/>
  <!-- Double eighth notes -->
  <g fill="#FFFFFF">
    <!-- Left note head -->
    <ellipse cx="35" cy="72" rx="10" ry="7" transform="rotate(-15 35 72)"/>
    <!-- Right note head -->
    <ellipse cx="65" cy="66" rx="10" ry="7" transform="rotate(-15 65 66)"/>
    <!-- Left stem -->
    <rect x="43" y="28" width="3.5" height="45" rx="1.5"/>
    <!-- Right stem -->
    <rect x="73" y="22" width="3.5" height="45" rx="1.5"/>
    <!-- Top beam -->
    <rect x="43" y="22" width="33.5" height="5" rx="2"/>
    <!-- Bottom beam -->
    <rect x="43" y="31" width="33.5" height="5" rx="2"/>
  </g>
</svg>
